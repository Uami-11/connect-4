apiVersion: apps/v1
kind: Deployment
metadata:
  name: connect4
  namespace: connect4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: connect4
  template:
    metadata:
      labels:
        app: connect4
    spec:
      containers:
      - name: connect4
        image: ghcr.io/uami-11/connect-4:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: connect4-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: connect4-secrets
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: connect4
  namespace: connect4
spec:
  selector:
    app: connect4
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: connect4
  namespace: connect4
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: connect4.maharjannirwan.com.np
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: connect4
            port:
              number: 80
