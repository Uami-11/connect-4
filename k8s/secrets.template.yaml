# Copy this to secrets.yaml, fill in real values, then:
#   kubectl apply -f k8s/secrets.yaml
#
# NEVER commit the filled-in secrets.yaml to Git.
# Add secrets.yaml to .gitignore.

apiVersion: v1
kind: Secret
metadata:
  name: connect4-secrets
  namespace: connect4
type: Opaque
stringData:
  DB_USER: "connect4user"
  DB_PASSWORD: "changeme"
  DATABASE_URL: "postgres://connect4user:changeme@postgres.connect4.svc.cluster.local:5432/connect4"
  JWT_SECRET: "change-this-to-a-long-random-string"
